services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PUBLIC_PORT:-3001}:3000"
    init: true
    environment:
      PORT: "3000"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-now}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-operator@rendycrm.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-password}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-*}"
      CORS_ALLOW_CREDENTIALS: "${CORS_ALLOW_CREDENTIALS:-false}"
      TELEGRAM_CLIENT_WEBHOOK_SECRET: "${TELEGRAM_CLIENT_WEBHOOK_SECRET:-}"
      TELEGRAM_OPERATOR_WEBHOOK_SECRET: "${TELEGRAM_OPERATOR_WEBHOOK_SECRET:-}"
      TELEGRAM_API_BASE_URL: "${TELEGRAM_API_BASE_URL:-https://api.telegram.org}"
      TELEGRAM_CLIENT_BOT_TOKEN: "${TELEGRAM_CLIENT_BOT_TOKEN:-}"
      TELEGRAM_OPERATOR_BOT_TOKEN: "${TELEGRAM_OPERATOR_BOT_TOKEN:-}"
      CLIENT_WELCOME_MESSAGE: "${CLIENT_WELCOME_MESSAGE:-Здравствуйте! Помогу записаться или быстро отвечу на вопросы.}"
      CLIENT_SLOTS_MESSAGE: "${CLIENT_SLOTS_MESSAGE:-Свободные окна уточняются. Напишите желаемую дату или время, и я помогу с записью.}"
      CLIENT_PRICE_MESSAGE: "${CLIENT_PRICE_MESSAGE:-Стоимость уточняется у мастера. Напишите, какая услуга вас интересует, и я передам запрос.}"
      CLIENT_ADDRESS_MESSAGE: "${CLIENT_ADDRESS_MESSAGE:-Адрес: уточните адрес салона здесь или замените это сообщение в .env на актуальное.}"
      CLIENT_HANDOFF_MESSAGE: "${CLIENT_HANDOFF_MESSAGE:-Передаю ваш запрос человеку. Он ответит в этом чате.}"
      OPERATOR_WELCOME_MESSAGE: "${OPERATOR_WELCOME_MESSAGE:-Operator bot на связи. Доступны команды: /dashboard, /dialogs, /slots, /settings.}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 15s
    restart: unless-stopped
