services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rendycrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-56379}:6379"
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      POSTGRES_DSN: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/rendycrm?sslmode=disable
      REDIS_ADDR: redis:6379
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:-change-me-in-production}
      ENABLE_DEMO_SEED: ${ENABLE_DEMO_SEED:-true}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
