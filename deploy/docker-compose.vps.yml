services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rendycrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/app}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/app/api}
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      APP_BASE_PATH: ${APP_BASE_PATH:-/app}
      STATIC_DIR: ""
      POSTGRES_DSN: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/rendycrm?sslmode=disable
      REDIS_ADDR: redis:6379
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:-change-me-in-production}
      ENABLE_DEMO_SEED: ${ENABLE_DEMO_SEED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/app}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/app/api}
    ports:
      - "${WEB_PORT:-8081}:${NGINX_PORT:-8080}"
    environment:
      NGINX_PORT: ${NGINX_PORT:-8080}
      APP_BASE_PATH: ${APP_BASE_PATH:-/app}
      API_BASE_URL: ${API_BASE_URL:-/app/api}
      API_UPSTREAM: ${API_UPSTREAM:-http://api:3000}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
