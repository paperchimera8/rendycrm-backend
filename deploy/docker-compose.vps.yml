services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      PORT: "3000"
      STATIC_DIR: "/web"
      POSTGRES_DSN: ${POSTGRES_DSN:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-prefer}
      POSTGRES_SSLROOTCERT: ${POSTGRES_SSLROOTCERT:-}
      POSTGRES_SSLROOTCERT_URL: ${POSTGRES_SSLROOTCERT_URL:-}
      REDIS_ADDR: ${REDIS_ADDR:-}
      REDIS_HOST: ${REDIS_HOST:-}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8081/api}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:-change-me-in-production}
      ENABLE_DEMO_SEED: ${ENABLE_DEMO_SEED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "${WEB_PORT:-3000}:${NGINX_PORT:-8080}"
    environment:
      NGINX_PORT: ${NGINX_PORT:-8080}
      API_BASE_URL: ${API_BASE_URL:-/api}
      API_UPSTREAM: ${API_UPSTREAM:-http://api:3000}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
